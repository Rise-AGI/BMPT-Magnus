seed: 42

models:
  policy:
    path: /data/zhaoweiran/models/Qwen/Qwen2.5-7B
    trainable: true

optimizer:
  type: adamw
  lr: 1.0e-5
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 200
  min_lr_ratio: 0.1

train:
  control_mode: epoch
  epochs: 4
  max_steps: -1
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  mixed_precision: bf16
  grad_clip_norm: 1.0
  checkpoint_every_steps: 200
  checkpoint_dir: checkpoints/qwen25_sft_fullparam_torch
  load_ckpt_path: null
  load_ckpt_mode: full
  load_ckpt_strict: true
  log_every_steps: 10

runtime:
  backend: accelerate
  distributed_backend: nccl
  attn_implementation: auto
  metrics:
    enabled: true
    window_size: 20
    global_throughput: true
    output: []
  deepspeed_config_path: deepspeed_zero2.json
  debug: false
  compile: false
  gradient_checkpointing: true
  flash_attention: true

data:
  tokenizer_source: null   # 可选：policy/reference/或直接路径，优先级高于顶层tokenizer_source
  sources:
    - path: data/processed/train.jsonl
      required_keys: [prompt, response]
      tokenize_keys: [prompt, response]
      name: train
    - path: data/processed/val.jsonl
      required_keys: [prompt, response]
      tokenize_keys: [prompt, response]
      name: val
  max_seq_len: 512
  cache_dir: null
