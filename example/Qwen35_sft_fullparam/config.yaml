seed: 42

models:
  policy:
    path: Qwen/Qwen3.5-7B-Instruct
    trainable: true

optimizer:
  type: adamw
  lr: 1.0e-5
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 200
  min_lr_ratio: 0.1

train:
  control_mode: epoch
  epochs: 3
  max_steps: -1
  per_device_batch_size: 1
  gradient_accumulation_steps: 16
  max_seq_len: 4096
  mixed_precision: bf16
  grad_clip_norm: 1.0
  checkpoint_every_steps: 200
  checkpoint_dir: checkpoints/qwen35_sft_fullparam
  load_ckpt_path: null
  load_ckpt_mode: full
  load_ckpt_strict: true
  log_every_steps: 10

runtime:
  backend: accelerate
  training_backend: deepspeed
  distributed_backend: nccl
  attn_implementation: auto
  metrics:
    enabled: true
    window_size: 20
    global_throughput: true
    output: []
  deepspeed_config_path: deepspeed_zero2.json
  compile: false
  gradient_checkpointing: true
  flash_attention: true

data:
  train_path: data/train.jsonl
  val_path: null
  prompt_key: prompt
  response_key: response
