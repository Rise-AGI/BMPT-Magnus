seed: 42

models:
  policy:
    path: Qwen/Qwen3.5-7B-Instruct
    trainable: true
    lora:
      enabled: true
      r: 64
      alpha: 128
      dropout: 0.05
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj

optimizer:
  type: adamw
  lr: 2.0e-5
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 100
  min_lr_ratio: 0.1

train:
  control_mode: step
  epochs: 1
  max_steps: -1
  per_device_batch_size: 2
  gradient_accumulation_steps: 8
  max_seq_len: 4096
  mixed_precision: bf16
  grad_clip_norm: 1.0
  checkpoint_every_steps: 500
  checkpoint_dir: checkpoints
  log_every_steps: 10

runtime:
  backend: accelerate
  training_backend: pytorch
  distributed_backend: nccl
  deepspeed_config_path: ../../train/deepspeed_zero2.json
  compile: false
  gradient_checkpointing: true
  flash_attention: true

data:
  train_path: data/train.jsonl
  val_path: null
  prompt_key: prompt
  response_key: response
