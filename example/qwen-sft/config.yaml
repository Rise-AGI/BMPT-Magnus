# BMPT SFT 训练配置示例

# 模型配置
models:
  policy:
    path: Qwen/Qwen2.5-7B-Instruct
    trainable: true
    lora:
      enabled: false

# 数据配置
data:
  sources:
    - name: train
      path: data/train.jsonl
      required_keys: [prompt, response]
      tokenize_keys: [prompt, response]
  max_seq_len: 2048
  cache_dir: data/cache
  tokenizer_source: policy
  loader:
    num_workers: 4
    prefetch_factor: 2
    persistent_workers: true

# 训练配置
train:
  max_steps: 500
  per_device_batch_size: 2
  gradient_accumulation_steps: 4
  mixed_precision: bf16
  grad_clip_norm: 1.0
  log_every_steps: 10
  checkpoint_every_steps: 100
  checkpoint_dir: checkpoints

# 优化器配置
optimizer:
  type: adamw
  lr: 2.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

# 学习率调度器配置
scheduler:
  type: cosine
  warmup_steps: 50
  min_lr_ratio: 0.1

# 运行时配置
runtime:
  distributed_backend: nccl
  deepspeed_config_path: deepspeed_zero2.json
  gradient_checkpointing: true
  attn_implementation: auto
  metrics:
    enabled: true
    global_throughput: true
    window_size: 20
    output: stdout