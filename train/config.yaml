seed: 42
tokenizer_source: builder

algorithm:
  name: pbv_stage1
  step: pbv_stage1
  max_prompt_tokens: 384
  training_schedule:
    planner_steps: 0
    builder_steps: 2
  planner:
    max_plan_tokens: 240
    max_plan_steps: 12
    step_token_budget: 80
    gamma: 0.95
    temperature: 0.8
    reward_mix_final: 0.0
  builder:
    k_samples: 2
    step_max_tokens: 240
    temperature: 0.95
    kl_beta: 0.02
    pass_select_tau: 0.7
    verifier_threshold: 0.5

models:
  planner:
    path: /data/zhaoweiran/models/Qwen/Qwen2.5-7B
    trainable: false
  builder:
    path: /data/zhaoweiran/models/Qwen/Qwen2.5-7B
    trainable: true
  verifier:
    path: /data/zhaoweiran/models/Qwen/Qwen2.5-7B
    trainable: false

optimizer:
  type: adamw
  lr: 2.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 200
  min_lr_ratio: 0.1

train:
  train_target_model: builder
  control_mode: step
  max_steps: 6000
  per_device_batch_size: 1
  gradient_accumulation_steps: 16
  mixed_precision: bf16
  grad_clip_norm: 1.0
  log_every_steps: 10
  checkpoint_every_steps: 500
  checkpoint_dir: /data/magnus/rl-group/rl-test-2/

runtime:
  deepspeed_config_path: deepspeed.zero2.json
  attn_implementation: flash_attention_2
  gradient_checkpointing: true
  metrics:
    enabled: true
    window_size: 50
    global_throughput: true
    output: [stdout]

prompting:
  composers:
    planner_context:
      prompts:
        - "你是规划器，你需要把题目拆成可批改的小目标，形如\"根据 xyz 计算 abc\"。\n题目：\n"
        - ""
      max_total_len: 2048
      truncate_side: right
      add_bos: false
      add_eos: false
    builder_context:
      prompts:
        - "你是物理解题器，你不需要解出题目，只需要完成目标。\n题目：\n"
        - "\n\n下一步：\n"
        - "\n\n已完成过程：\n"
        - "\n\n你不需要解出题目，完成下一步后立刻结束，否则即使解答正确也判定为失败"
      max_total_len: 4096
      truncate_side: left
      add_bos: false
      add_eos: false
    verifier_judge:
      prompts:
        - "你是严格验证器。请先在内部思考，不要输出思考过程。\n题目：\n"
        - "\n\n计划步骤：\n"
        - "\n\n已接受前缀：\n"
        - "\n\n候选答案：\n"
        - "\n\n请判断候选是否与题目和步骤一致。仅输出 Right 或 Wrong。"
      max_total_len: 4096
      truncate_side: left
      add_bos: false
      add_eos: false

data:
  max_seq_len: 4096
  sources:
    - name: train
      path: data/data.jsonl 
      required_keys: [prompt]
      tokenize_keys: [prompt]
