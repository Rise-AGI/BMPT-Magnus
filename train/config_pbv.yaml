models:
  builder:
    path: /data/zhaoweiran/models/Qwen/Qwen2.5-7B
    trainable: true
    lora:
      enabled: false
  shared_frozen:
    path: /data/zhaoweiran/models/Qwen/Qwen2.5-7B
    trainable: false

data:
  sources:
    - name: train
      path: train/data/data.jsonl
      required_keys: [question, answer]
      tokenize_keys: [question, answer]
  max_seq_len: 2048
  cache_dir: train/data/cache
  tokenizer_source: builder
  loader:
    num_workers: 2
    prefetch_factor: 2
    persistent_workers: true

train:
  max_steps: 200
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  mixed_precision: bf16
  grad_clip_norm: 1.0
  log_every_steps: 5

optimizer:
  type: adamw
  lr: 2.0e-6
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 20
  min_lr_ratio: 0.1

runtime:
  distributed_backend: nccl
  deepspeed_config_path: deepspeed_zero2.json
  gradient_checkpointing: true
  attn_implementation: flash_attention_2
  metrics:
    enabled: true
    global_throughput: true
    window_size: 20
    output: stdout

prompting:
  tokenizer_source: builder
  composers:

    planner:
      prompts:
        - |
          你是物理解题规划器。
          你只输出“解题方向”，不输出任何表达式或计算结果。
          严格规则：
          - 每行必须严格写成：根据<已知/定律/关系>求<目标量/关系>
          - 一行一个方向句
          - 只允许方向描述，不允许推导过程
          - 不允许编号、项目符号、解释性文字
          - 不要直接给最终答案
          题目：
        - |

          现在开始输出方向句（逐行）。
      max_total_len: 2048
      truncate_side: right
      add_bos: false
      add_eos: false
    builder:
      prompts:
        - |
          你是物理解题步骤执行器。
          你只完成当前目标，不要完成整题。
          题目：
        - |

          已接受前缀（可能为空）：
        - |

          当前目标方向：
        - |

          输出规则：
          - 只输出与当前目标直接相关的新推导或新结论
          - 不要复述规则，不要输出“Only final result”等元指令
          - 不要输出无关格式约束、写作规范或免责声明
          - 保持简洁可检验
          - 不要给整题最终答案
      max_total_len: 4096
      truncate_side: left
      add_bos: false
      add_eos: false
    verifier:
      prompts:
        - |
          你是严格的物理解题过程验证器。
          你需要判断候选内容是否与题目、当前目标、已接受前缀、标准答案一致。
          重点看数学与物理语义一致性，而不是字面一致。
          题目：
        - |

          当前目标方向：
        - |

          已接受前缀：
        - |

          候选输出：
        - |

          标准答案：
        - |

          判定规则：
          - 只输出一个词：Right 或 Wrong
          - Right：候选与当前目标一致，且有有效推进
          - Wrong：存在矛盾、无关内容、无推进
          - Wrong：候选主要是元指令/格式要求/规则复述，而非解题内容
      max_total_len: 4096
      truncate_side: left
      add_bos: false
      add_eos: false

algorithm:
  div_num: 4
  planner:
    max_plan_steps: 12
    max_new_tokens: 96
  builder:
    k_samples: 2
    max_new_tokens: 96
    temperature: 0.8
    top_p: 0.95
    select_tau: 1.0
    kl_beta: 0.02
  verifier:
    threshold: 0.5
    max_new_tokens: 6
