models:
  builder:
    path: /data/zhaoweiran/models/Qwen/Qwen2.5-7B
    trainable: true
    lora:
      enabled: false
  shared_frozen:
    path: /data/zhaoweiran/models/Qwen/Qwen2.5-7B
    trainable: false

data:
  sources:
    - name: train
      path: train/data/data.jsonl
      required_keys: [question, answer]
      tokenize_keys: [question, answer]
  max_seq_len: 2048
  cache_dir: train/data/cache
  tokenizer_source: builder
  loader:
    num_workers: 2
    prefetch_factor: 2
    persistent_workers: true

train:
  max_steps: 200
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  mixed_precision: bf16
  grad_clip_norm: 1.0
  log_every_steps: 5

optimizer:
  type: adamw
  lr: 2.0e-6
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 20
  min_lr_ratio: 0.1

runtime:
  distributed_backend: nccl
  deepspeed_config_path: deepspeed_zero2.json
  gradient_checkpointing: true
  attn_implementation: flash_attention_2
  metrics:
    enabled: true
    global_throughput: true
    window_size: 20
    output: stdout

prompting:
  tokenizer_source: builder
  composers:

    planner:
      prompts:
        - |
          You are a physics solution planner.
          Decompose the problem into verifiable micro-goals that can be checked independently.
          Rules:
          - Output ONLY plan steps.
          - One step per line.
          - Each line should produce a concrete intermediate result (equation, variable value, or condition).
          - Do NOT solve the full problem.
          - Do NOT output numbering, markdown, or explanations.
          Problem:
        - |

          Now output the plan steps.
      max_total_len: 2048
      truncate_side: right
      add_bos: false
      add_eos: false
    builder:
      prompts:
        - |
          You are a step executor for physics reasoning.
          You must complete ONLY the current target steps, not the whole problem.
          Problem:
        - |

          Accepted previous steps (may be empty):
        - |

          Current target steps to complete:
        - |

          Output requirements:
          - Return only the new reasoning/result for current target steps.
          - Keep it concise and directly checkable.
          - No final conclusion for the whole problem.
          - No markdown list, no extra commentary.
      max_total_len: 4096
      truncate_side: left
      add_bos: false
      add_eos: false
    verifier:
      prompts:
        - |
          You are a strict process verifier for physics solutions.
          Evaluate whether the candidate step output is consistent with:
          (1) problem statement, (2) current plan steps, (3) accepted prefix, and (4) reference answer.
          Judge semantic/math equivalence, not literal wording.
          Problem:
        - |

          Current plan steps:
        - |

          Accepted previous steps:
        - |

          Candidate step output:
        - |

          Reference answer:
        - |

          Decision rule:
          - Output exactly one word: Right or Wrong.
          - Right: candidate is mathematically consistent and advances current plan steps.
          - Wrong: contradiction, irrelevant content, or no valid progress.
      max_total_len: 4096
      truncate_side: left
      add_bos: false
      add_eos: false

algorithm:
  div_num: 4
  planner:
    max_plan_steps: 12
    max_new_tokens: 96
  builder:
    k_samples: 2
    max_new_tokens: 96
    temperature: 0.8
    top_p: 0.95
    select_tau: 1.0
    kl_beta: 0.02
  verifier:
    threshold: 0.5
    max_new_tokens: 6
