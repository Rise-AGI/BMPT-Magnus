models:
  builder:
    path: /data/zhaoweiran/models/Qwen/Qwen2.5-7B
    trainable: true
    lora:
      enabled: false
  shared_frozen:
    path: /data/zhaoweiran/models/Qwen/Qwen2.5-7B
    trainable: false

data:
  sources:
    - name: train
      path: train/data/data.jsonl
      required_keys: [question, answer]
      tokenize_keys: [question, answer]
  max_seq_len: 2048
  cache_dir: train/data/cache
  tokenizer_source: builder
  loader:
    num_workers: 2
    prefetch_factor: 2
    persistent_workers: true

train:
  max_steps: 200
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  mixed_precision: bf16
  grad_clip_norm: 1.0
  log_every_steps: 5

optimizer:
  type: adamw
  lr: 2.0e-6
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 20
  min_lr_ratio: 0.1

runtime:
  distributed_backend: nccl
  deepspeed_config_path: deepspeed_zero2.json
  gradient_checkpointing: true
  attn_implementation: flash_attention_2
  metrics:
    enabled: true
    global_throughput: true
    window_size: 20
    output: stdout

prompting:
  tokenizer_source: builder
  composers:

    planner:
      prompts:
        - "你是规划器，你需要把题目拆成可批改的小目标，形如\"根据 xyz 计算 abc\"。\n题目：\n"
        - ""
      max_total_len: 2048
      truncate_side: right
      add_bos: false
      add_eos: false
    builder:
      prompts:
        - "你是物理解题器，你不需要解出题目，只需要完成目标。\n题目：\n"
        - "\n\n目标：\n"
        - "\n\n已完成过程：\n"
        - "\n\n你不需要解出题目，完成目标后立刻结束，否则即使解答正确也判定为失败"
      max_total_len: 4096
      truncate_side: left
      add_bos: false
      add_eos: false
    verifier:
      prompts:
        - "你是严格验证器。请先在内部思考，不要输出思考过程。\n题目：\n"
        - "\n\n计划步骤：\n"
        - "\n\n已接受前缀：\n"
        - "\n\n候选答案：\n"
        - "\n\n请判断候选是否与题目和步骤一致。仅输出 Right 或 Wrong。"
      max_total_len: 4096
      truncate_side: left
      add_bos: false
      add_eos: false

algorithm:
  div_num: 4
  planner:
    max_plan_steps: 12
    max_new_tokens: 96
  builder:
    k_samples: 2
    max_new_tokens: 96
    temperature: 0.8
    top_p: 0.95
    select_tau: 1.0
    kl_beta: 0.02
  verifier:
    threshold: 0.5
    max_new_tokens: 6
